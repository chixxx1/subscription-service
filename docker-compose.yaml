services:
  api:
    build: .
    container_name: subscription-api
    ports:
      - "8080:8080"
    environment:
      - POSTGRES_HOST=subscr-postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    depends_on:
      subscr-postgres:
        condition: service_healthy
    restart: always

  subscr-postgres:
    image: postgres:18.3-bookworm
    container_name: subscr-env-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - ./out/pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  swagger:
    image: ghcr.io/swaggo/swag:v1.16.4
    volumes:
      - .:/app
    working_dir: /app
    entrypoint: ["swag"]

  migrate:
    image: migrate/migrate:v4.15.2
    volumes:
      - ./migrations:/migrations
    entrypoint: ["migrate"]
